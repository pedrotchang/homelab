apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocket-chat-mongodb
  labels:
    app: rocket-chat-mongodb
    app.kubernetes.io/name: rocket-chat-mongodb
    app.kubernetes.io/instance: rocket-chat
    app.kubernetes.io/component: database
spec:
  serviceName: rocket-chat-mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app: rocket-chat-mongodb
  template:
    metadata:
      labels:
        app: rocket-chat-mongodb
        app.kubernetes.io/name: rocket-chat-mongodb
        app.kubernetes.io/instance: rocket-chat
        app.kubernetes.io/component: database
        policy-type: "database"
    spec:
      securityContext:
        fsGroup: 1001

      containers:
        - name: mongodb
          image: bitnami/mongodb:7.0
          securityContext:
            runAsUser: 1001
            allowPrivilegeEscalation: false

          env:
            - name: MONGODB_REPLICA_SET_MODE
              value: primary
            - name: MONGODB_REPLICA_SET_NAME
              value: rs0
            - name: MONGODB_REPLICA_SET_KEY
              value: rocketchatrs0key
            - name: MONGODB_ROOT_USER
              value: admin
            - name: MONGODB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rocket-chat-mongodb-creds
                  key: root-password
            - name: MONGODB_USERNAME
              value: rocketchat
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rocket-chat-mongodb-creds
                  key: password
            - name: MONGODB_DATABASE
              value: rocketchat
            - name: MONGODB_EXTRA_FLAGS
              value: "--wiredTigerCacheSizeGB=0.5"

          ports:
            - containerPort: 27017
              protocol: TCP

          volumeMounts:
            - name: data
              mountPath: /bitnami/mongodb
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d

          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi

          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10

          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: init-scripts
          configMap:
            name: rocket-chat-mongodb-init

      restartPolicy: Always

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rocket-chat-mongodb-headless
  labels:
    app: rocket-chat-mongodb
spec:
  clusterIP: None
  selector:
    app: rocket-chat-mongodb
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: rocket-chat-mongodb-lb
  labels:
    app: rocket-chat-mongodb
    cilium-lb-pool: postgres-pool
  annotations:
    external-dns.alpha.kubernetes.io/hostname: rocket-chat-mongo.seyzahl.com
spec:
  type: LoadBalancer
  selector:
    app: rocket-chat-mongodb
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rocket-chat-mongodb-init
data:
  grant-oplog-access.js: |
    // Grant clusterMonitor role for Rocket.Chat oplog/change stream access
    db.grantRolesToUser('rocketchat', [
      { role: 'clusterMonitor', db: 'admin' }
    ]);
