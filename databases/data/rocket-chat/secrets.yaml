apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rocket-chat-mongodb-creds
  namespace: rocket-chat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: root-password
      remoteRef:
        key: rocket-chat-mongodb-root-password
    - secretKey: password
      remoteRef:
        key: rocket-chat-mongodb-password
