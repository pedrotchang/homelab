apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-db-tachtit-cnpg-v0
spec:
  description: Postgres cluster for Nextcloud
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  instances: 2

  inheritedMetadata:
    labels:
      app: nextcloud-database
      policy-type: "database"

  monitoring:
    enablePodMonitor: true

  storage:
    size: 5Gi

  bootstrap:
    initdb:
      database: nextcloud
      owner: nextcloud
      secret:
        name: nextcloud-db-creds

  resources:
    requests:
      memory: 512Mi

  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: "nextcloud-db-lb"
              labels:
                cilium-lb-pool: postgres-pool
              annotations:
                external-dns.alpha.kubernetes.io/hostname: nextcloud-pg.seyzahl.com
            spec:
              type: LoadBalancer
