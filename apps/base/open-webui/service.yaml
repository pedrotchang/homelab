apiVersion: v1
kind: Service
metadata:
  name: open-webui
  labels:
    app: open-webui
  annotations:
    omni-kube-service-exposer.sidero.dev/label: open-webui
    omni-kube-service-exposer.sidero.dev/port: "8080"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: open-webui
