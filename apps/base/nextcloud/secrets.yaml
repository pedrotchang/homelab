apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-admin-creds
  namespace: nextcloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: username
      remoteRef:
        key: nextcloud-admin-username
    - secretKey: password
      remoteRef:
        key: nextcloud-admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-db-env
  namespace: nextcloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: nextcloud-db-username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: nextcloud-db-password
