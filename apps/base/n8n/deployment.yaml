apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/component: automation
    app.kubernetes.io/instance: n8n
    app.kubernetes.io/name: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        app.kubernetes.io/component: automation
        app.kubernetes.io/instance: n8n
        app.kubernetes.io/name: n8n
        policy-type: "app"
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:1.37
          command:
            - sh
            - -c
            - chown -R 1000:1000 /home/node/.n8n
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
        - name: install-ffmpeg
          image: node:20-bookworm-slim
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.n8n/bin
              if [ ! -f /home/node/.n8n/bin/ffmpeg ]; then
                npm install --prefix /tmp/ffmpeg-pkg ffmpeg-static
                cp /tmp/ffmpeg-pkg/node_modules/ffmpeg-static/ffmpeg /home/node/.n8n/bin/ffmpeg
                chmod +x /home/node/.n8n/bin/ffmpeg
              fi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:2.4.8
          env:
            - name: PATH
              value: "/home/node/.n8n/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          envFrom:
            - configMapRef:
                name: n8n-configmap
            - secretRef:
                name: n8n-container-env
          ports:
            - containerPort: 3008
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3008
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3008
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
      restartPolicy: Always
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data-pvc-nfs
